<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PeçaPC Pro — Otimizador de Hardware</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #e67e22; --dark: #1a1a1a; --bg: #f8f9fa; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: #333; }
        header { background: var(--dark); color: white; padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; border-bottom: 4px solid var(--primary); }
        .logo { font-size: 1.6rem; font-weight: 700; }
        .logo span { color: var(--primary); }
        .nav-btns button { background: transparent; border: 1px solid #444; color: #ddd; padding: 8px 16px; border-radius: 4px; cursor: pointer; margin-left: 10px; font-size: 13px; }
        .nav-btns button:hover { border-color: var(--primary); color: white; }
        .container { max-width: 1000px; margin: 20px auto; padding: 20px; }
        .tabs { display: flex; gap: 20px; border-bottom: 2px solid #ddd; margin-bottom: 20px; }
        .tab { padding: 10px 0; cursor: pointer; font-weight: 600; color: #666; }
        .tab.active { color: var(--primary); border-bottom: 3px solid var(--primary); }
        .build-card { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); margin-bottom: 15px; display: grid; grid-template-columns: 1fr auto; align-items: center; }
        .price { font-weight: 700; color: var(--primary); font-size: 1.2rem; }
        .btn-main { background: var(--primary); color: white; border: none; padding: 12px; border-radius: 6px; cursor: pointer; font-weight: 700; width: 100%; margin-top: 10px; }
        #auth-box { background: white; padding: 20px; border-radius: 8px; border: 1px solid #ddd; display: none; margin-bottom: 20px; }
        input { width: 100%; padding: 10px; margin: 5px 0 15px 0; border: 1px solid #ccc; border-radius: 4px; }
    </style>
</head>
<body>

<header>
    <div class="logo">PEÇA<span>PC</span></div>
    <div class="nav-btns">
        <button onclick="toggleAuth()">Minha Conta</button>
        <button onclick="shareBuild()">Compartilhar Build</button>
    </div>
</header>

<div class="container">
    <div id="auth-box">
        <h3>Acesso Seguro</h3>
        <input type="email" id="email" placeholder="E-mail">
        <input type="password" id="password" placeholder="Senha">
        <button class="btn-main" onclick="handleAuth()">Entrar / Registrar</button>
    </div>

    <div class="tabs">
        <div class="tab active" id="t1" onclick="switchTab(1)">OFICIAIS</div>
        <div class="tab" id="t2" onclick="switchTab(2)">TERCEIROS / USADOS</div>
    </div>

    <div id="main-list">
        <div class="build-card">
            <div>
                <strong>Processador</strong><br>
                <small id="cpu-name">Ryzen 5 5600</small>
            </div>
            <div class="price">R$ 849,00</div>
        </div>
    </div>
</div>

<script>
    const SUPABASE_URL = 'https://fzdwbxxiiliykvqflefp.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_dc6xvoMbfW_nLJgTMEUavQ_o1aIEZW1';
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    async function handleAuth() {
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const { error } = await supabaseClient.auth.signInWithPassword({ email, password });
        if (error) {
            const { error: signUpErr } = await supabaseClient.auth.signUp({ email, password });
            if (signUpErr) alert(signUpErr.message);
            else alert("Verifique seu e-mail para confirmar!");
        } else {
            location.reload();
        }
    }

    function toggleAuth() {
        const box = document.getElementById('auth-box');
        box.style.display = box.style.display === 'block' ? 'none' : 'block';
    }

    async function shareBuild() {
        const { data: { user } } = await supabaseClient.auth.getUser();
        if (!user) return alert("Faça login para gerar um link de compartilhamento!");

        const buildData = { cpu: "Ryzen 5 5600", price: 849 }; // Example data

        const { data, error } = await supabaseClient
            .from('builds')
            .insert([{ user_id: user.id, build_data: buildData, is_public: true }])
            .select();

        if (data) {
            const url = window.location.href.split('?')[0] + '?id=' + data[0].id;
            navigator.clipboard.writeText(url);
            alert("Link copiado! Seu amigo pode ver esta build agora: " + url);
        }
    }

    function switchTab(n) {
        document.getElementById('t1').classList.toggle('active', n === 1);
        document.getElementById('t2').classList.toggle('active', n === 2);
    }
</script>
</body>
</html>
